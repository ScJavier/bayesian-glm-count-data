name: Validate (no publish)

# CI solo valida que Quarto puede leer el proyecto.
# La publicación a GitHub Pages se hace manualmente desde local:
#   QUARTO_PYTHON=.venv/bin/python quarto publish gh-pages --no-browser
#
# Razón: quarto render en CI produce HTML sin outputs porque los notebooks
# están strippeados (nbstripout) y el mecanismo freeze no bypassa el hash
# check en la práctica. quarto publish desde local usa los notebooks con
# outputs que Quarto generó durante --execute, y sí produce HTML correcto.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Validate project structure
        run: |
          quarto check
          echo "✓ _freeze/ entries: $(find _freeze -name '*.json' | wc -l)"
          echo "✓ notebooks: $(ls notebooks/*.ipynb | wc -l)"
