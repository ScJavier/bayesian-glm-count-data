project:
  type: book
  output-dir: _site

book:
  title: "Modelos para Datos de Conteo"
  subtitle: "Un recorrido bayesiano"
  author: "Javier Santibanez"
  date: "2026-04-26"
  repo-url: https://github.com/ScJavier/bayesian-glm-count-data
  repo-actions: [issue]
  chapters:
    - index.qmd
    - part: "Exploración de datos"
      chapters:
        - notebooks/01_basic_eda.ipynb
        - notebooks/01b_extended.ipynb
    - part: "Teoría: MLE desde cero"
      chapters:
        - notebooks/02_mle_theory.ipynb
    - part: "Inferencia Bayesiana"
      chapters:
        - notebooks/03_bayesian_inference.ipynb
    - part: "Diagnóstico y expansión de modelos"
      chapters:
        - notebooks/04_predictive_checks_base_models.ipynb
        - notebooks/05_predictive_checks_extended_models.ipynb

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-tools: true
    highlight-style: github
    fig-align: center

# freeze: true — CI siempre usa _freeze/ sin verificar hashes
# (freeze: auto descartaba el cache cuando nbstripout limpiaba los notebooks)
# Para re-ejecutar localmente: QUARTO_PYTHON=.venv/bin/python quarto render --execute
execute:
  freeze: true
